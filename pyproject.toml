[tool.uv.workspace]
members = ["apps/*", "libs/*"]

[dependency-groups]
dev = [
  "ruff>=0.15.12",
  "ty>=0.0.30",
  "pytest>=9.0.3",
]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -v -s --tb=short"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
